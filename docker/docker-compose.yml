services:
  build:
    image: emscripten/emsdk
    volumes:
      - ../:/src
    working_dir: /src/build
    command: >
      bash -c "
        mkdir -p /src/build &&
        cd /src/build &&
        emcmake cmake .. -DCMAKE_BUILD_TYPE=Release &&
        emmake make
      "

  test:
    image: gcc:latest
    volumes:
      - ../:/src
    working_dir: /src/build-native
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq cmake > /dev/null 2>&1 &&
        mkdir -p /src/build-native &&
        cd /src/build-native &&
        cmake .. -DCMAKE_BUILD_TYPE=Release &&
        make -j\$(nproc) &&
        if [ -f /src/models/ggml-model-i2_s.gguf ]; then
          ./test_inference /src/models/ggml-model-i2_s.gguf;
        else
          ./test_inference;
        fi
      "

  generate:
    image: gcc:latest
    volumes:
      - ../:/src
    working_dir: /src/build-native
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq cmake > /dev/null 2>&1 &&
        mkdir -p /src/build-native &&
        cd /src/build-native &&
        cmake .. -DCMAKE_BUILD_TYPE=Release &&
        make -j\$$(nproc) bitnet-cli &&
        ./bitnet-cli /src/models/ggml-model-i2_s.gguf -p 'Hello' -n 32
      "
