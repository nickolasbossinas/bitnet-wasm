<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitNet WASM Inference</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .section {
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #8b949e;
        }
        input[type="number"], input[type="text"] {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            width: 120px;
            font-size: 0.9rem;
        }
        input[type="file"] {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        textarea {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            height: fit-content;
        }
        button:hover { background: #2ea043; }
        button:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
        }
        #status {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #output {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            color: #c9d1d9;
        }
        #output .prompt-text { color: #8b949e; }
        #output .gen-text { color: #7ee787; }
        #stats {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #8b949e;
            white-space: pre-wrap;
            display: none;
        }
        .simd-check {
            margin-bottom: 1rem;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .simd-yes {
            background: #0d2818;
            border: 1px solid #238636;
            color: #7ee787;
        }
        .simd-no {
            background: #2d1117;
            border: 1px solid #da3633;
            color: #f85149;
        }
    </style>
</head>
<body>
    <h1>BitNet WASM Inference</h1>
    <p class="subtitle">
        BitNet b1.58 2B4T text generation in the browser via WebAssembly SIMD
    </p>

    <div id="simd-status" class="simd-check"></div>

    <div id="status">Initializing...</div>

    <!-- Model Loading -->
    <div class="section">
        <div class="section-title">Model</div>
        <div class="controls">
            <div class="input-group">
                <label>GGUF File</label>
                <input type="file" id="file-input" accept=".gguf" disabled>
            </div>
            <div class="input-group">
                <label>Layers (-1 = all)</label>
                <input type="number" id="layers-input" value="-1" min="-1" max="30">
            </div>
            <div class="input-group">
                <label>Threads (0 = single)</label>
                <input type="number" id="threads-input" value="5" min="0" max="7">
            </div>
            <button id="load-btn" disabled>Load Model</button>
        </div>
    </div>

    <!-- Generation Settings -->
    <div class="section">
        <div class="section-title">Settings</div>
        <div class="controls">
            <div class="input-group">
                <label>Max Tokens</label>
                <input type="number" id="max-tokens" value="64" min="1" max="512">
            </div>
            <div class="input-group">
                <label>Temperature</label>
                <input type="number" id="temperature" value="0.0" min="0" max="2" step="0.1">
            </div>
            <div class="input-group">
                <label>Top-p</label>
                <input type="number" id="top-p" value="0.9" min="0" max="1" step="0.05">
            </div>
            <div class="input-group">
                <label>Repetition Penalty</label>
                <input type="number" id="rep-penalty" value="1.1" min="1.0" max="2.0" step="0.05">
            </div>
            <div class="input-group">
                <label>Seed</label>
                <input type="number" id="seed" value="42" min="0">
            </div>
        </div>
    </div>

    <!-- Prompt -->
    <div class="section">
        <div class="section-title">Prompt</div>
        <textarea id="prompt" placeholder="Enter your prompt here...">Hello</textarea>
        <div style="margin-top: 0.5rem;">
            <button id="generate-btn" disabled>Generate</button>
        </div>
    </div>

    <!-- Output -->
    <div class="section">
        <div class="section-title">Output</div>
        <pre id="output">Load a model to start generating text.</pre>
    </div>

    <!-- Thread Benchmark -->
    <div class="section" id="bench-section" style="display:none;">
        <div class="section-title">Thread Benchmark</div>
        <div class="controls">
            <div class="input-group">
                <label>Max threads to test</label>
                <input type="number" id="bench-max-threads" value="7" min="1" max="7">
            </div>
            <button id="bench-btn" disabled>Benchmark Threads</button>
        </div>
        <pre id="bench-results" style="
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-top: 0.8rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #8b949e;
            white-space: pre-wrap;
            display: none;
        "></pre>
    </div>

    <!-- Stats -->
    <pre id="stats"></pre>

    <script type="module">
        import { BitNet } from './bitnet.js';

        /* ---- State ---- */
        const bitnet = new BitNet();

        /* ---- DOM refs ---- */
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const statsEl = document.getElementById('stats');
        const fileInput = document.getElementById('file-input');
        const layersInput = document.getElementById('layers-input');
        const threadsInput = document.getElementById('threads-input');
        const loadBtn = document.getElementById('load-btn');
        const generateBtn = document.getElementById('generate-btn');
        const benchSection = document.getElementById('bench-section');
        const benchBtn = document.getElementById('bench-btn');
        const benchMaxThreads = document.getElementById('bench-max-threads');
        const benchResultsEl = document.getElementById('bench-results');
        const promptEl = document.getElementById('prompt');

        /* ---- SIMD check ---- */
        async function checkSimd() {
            const el = document.getElementById('simd-status');
            try {
                const bytes = new Uint8Array([
                    0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
                    0x01, 0x05, 0x01, 0x60, 0x00, 0x01, 0x7b,
                    0x03, 0x02, 0x01, 0x00,
                    0x0a, 0x16, 0x01, 0x14, 0x00,
                    0xfd, 0x0c,
                    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                    0x0b
                ]);
                await WebAssembly.compile(bytes);
                const sabOk = typeof SharedArrayBuffer !== 'undefined';
                el.className = 'simd-check simd-yes';
                el.textContent = 'WASM SIMD supported' +
                    (sabOk ? ' | SharedArrayBuffer enabled (threading OK)' :
                             ' | SharedArrayBuffer disabled (need COOP/COEP headers, use serve.py)');
                if (!sabOk) {
                    threadsInput.value = '0';
                    threadsInput.disabled = true;
                }
                return true;
            } catch (e) {
                el.className = 'simd-check simd-no';
                el.textContent = 'WASM SIMD NOT supported - inference will fail';
                return false;
            }
        }

        /* ---- Status helper ---- */
        function setStatus(text, showSpinner) {
            statusEl.innerHTML = (showSpinner
                ? '<div class="spinner" style="display:inline-block"></div> '
                : '') + text;
        }

        /* ---- Load model ---- */
        async function loadModel() {
            const file = fileInput.files[0];
            if (!file) {
                setStatus('Please select a GGUF file first.', false);
                return;
            }

            loadBtn.disabled = true;
            generateBtn.disabled = true;

            try {
                const sizeMB = (file.size / 1024 / 1024).toFixed(0);
                setStatus('Reading ' + file.name + ' (' + sizeMB + ' MB)...', true);

                const buffer = await file.arrayBuffer();

                setStatus('Loading WASM module...', true);

                await bitnet.load(buffer, {
                    threads: parseInt(threadsInput.value) || 0,
                    layers: parseInt(layersInput.value) || -1,
                    onProgress: ({ message }) => setStatus(message, true)
                });

                setStatus('Model loaded. Ready to generate.', false);
                generateBtn.disabled = false;
                benchBtn.disabled = false;
                benchSection.style.display = '';
                outputEl.textContent = 'Model loaded. Enter a prompt and click Generate.';
            } catch (e) {
                setStatus('Load failed: ' + e.message, false);
            }
            loadBtn.disabled = false;
        }

        /* ---- Generate ---- */
        async function startGenerate() {
            if (!bitnet.loaded || bitnet.generating) return;

            const prompt = promptEl.value;
            if (!prompt) {
                setStatus('Please enter a prompt.', false);
                return;
            }

            generateBtn.disabled = true;

            /* Clear output, show prompt in grey + generated text in green */
            outputEl.innerHTML = '<span class="prompt-text"></span><span class="gen-text"></span>';
            outputEl.querySelector('.prompt-text').textContent = prompt;

            /* Clear stats */
            statsEl.textContent = '';
            statsEl.style.display = 'none';

            setStatus('Generating...', true);

            try {
                const result = await bitnet.generate(prompt, {
                    maxTokens: parseInt(document.getElementById('max-tokens').value) || 64,
                    temperature: parseFloat(document.getElementById('temperature').value) || 0.0,
                    topP: parseFloat(document.getElementById('top-p').value) || 0.9,
                    seed: parseInt(document.getElementById('seed').value) || 42,
                    repetitionPenalty: parseFloat(document.getElementById('rep-penalty').value) || 1.1,
                    onToken: (piece) => {
                        outputEl.querySelector('.gen-text').textContent += piece;
                        outputEl.scrollTop = outputEl.scrollHeight;
                    }
                });

                /* Display stats */
                const s = result.stats;
                if (s.prefillTokPerSec || s.decodeTokPerSec) {
                    statsEl.style.display = 'block';
                    let text = '';
                    if (s.prefillTokens) {
                        text += 'Prefill: ' + s.prefillTokens + ' tokens, ' +
                            s.prefillMs.toFixed(1) + ' ms (' + s.prefillTokPerSec.toFixed(1) + ' tok/s)\n';
                    }
                    if (s.decodeTokens) {
                        text += 'Decode: ' + s.decodeTokens + ' tokens, ' +
                            s.decodeMs.toFixed(1) + ' ms (' + s.decodeTokPerSec.toFixed(1) + ' tok/s)\n';
                    }
                    if (s.totalMs) {
                        text += 'Total: ' + s.totalMs.toFixed(1) + ' ms';
                    }
                    statsEl.textContent = text;
                }

                setStatus('Generated ' + result.tokenCount + ' tokens.', false);
            } catch (e) {
                if (e.name === 'AbortError') {
                    setStatus('Generation aborted.', false);
                } else {
                    setStatus('Error: ' + e.message, false);
                }
            }
            generateBtn.disabled = false;
        }

        /* ---- Thread Benchmark ---- */
        function formatBenchResults(results) {
            const lines = ['Threads  Decode tok/s  Tokens  Time (ms)'];
            lines.push('-------  ------------  ------  ---------');
            let best = 0, bestIdx = 0;
            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const label = r.threads === 0 ? '0 (ST)' : (r.threads + 1) + ' (' + r.threads + 'w)';
                lines.push(
                    label.padEnd(9) +
                    r.decode_tps.toFixed(1).padStart(12) +
                    String(r.decode_tokens).padStart(8) +
                    r.decode_ms.toFixed(0).padStart(11)
                );
                if (r.decode_tps > best) {
                    best = r.decode_tps;
                    bestIdx = i;
                }
            }
            if (results.length > 1) {
                const br = results[bestIdx];
                const label = br.threads === 0 ? '0 (single-threaded)' :
                    (br.threads + 1) + ' total (' + br.threads + ' workers)';
                lines.push('');
                lines.push('Best: ' + best.toFixed(1) + ' tok/s with ' + label);
                const baseline = results[0].decode_tps;
                if (baseline > 0 && best > baseline) {
                    lines.push('Speedup: ' + (best / baseline).toFixed(2) + 'x over single-threaded');
                }
            }
            return lines.join('\n');
        }

        async function startBenchmark() {
            if (!bitnet.loaded || bitnet.generating) return;

            benchBtn.disabled = true;
            generateBtn.disabled = true;

            const maxT = parseInt(benchMaxThreads.value) || 7;
            const results = [];
            const prompt = promptEl.value || 'Hello';
            const maxTokens = parseInt(document.getElementById('max-tokens').value) || 64;
            const repPenalty = parseFloat(document.getElementById('rep-penalty').value) || 1.1;

            benchResultsEl.style.display = 'block';
            benchResultsEl.textContent = 'Starting benchmark: 0 to ' + maxT + ' threads...\n';

            for (let t = 0; t <= maxT; t++) {
                const total = t === 0 ? 1 : t + 1;
                setStatus('Benchmark: setting ' + t + ' threads...', true);
                await bitnet.setThreads(t);

                setStatus('Benchmark: running with ' + total + ' thread(s)...', true);
                const result = await bitnet.generate(prompt, {
                    maxTokens,
                    temperature: 0.0,
                    topP: 0.9,
                    seed: 42,
                    repetitionPenalty: repPenalty
                });

                results.push({
                    threads: t,
                    decode_tps: result.stats.decodeTokPerSec || 0,
                    decode_tokens: result.stats.decodeTokens || 0,
                    decode_ms: result.stats.decodeMs || 0
                });
                benchResultsEl.textContent = formatBenchResults(results);
            }

            /* Restore original thread count */
            const origThreads = parseInt(threadsInput.value) || 0;
            await bitnet.setThreads(origThreads);

            generateBtn.disabled = false;
            benchBtn.disabled = false;
            setStatus('Benchmark complete.', false);
        }

        /* ---- Init ---- */
        async function init() {
            const simdOk = await checkSimd();
            if (!simdOk) {
                setStatus('Your browser does not support WASM SIMD.', false);
                return;
            }

            setStatus('Select a GGUF model file.', false);
            fileInput.disabled = false;
            loadBtn.disabled = false;

            loadBtn.onclick = loadModel;
            generateBtn.onclick = startGenerate;
            benchBtn.onclick = startBenchmark;
        }

        init();
    </script>
</body>
</html>
