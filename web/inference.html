<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitNet WASM Inference</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .section {
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: end;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #8b949e;
        }
        input[type="number"], input[type="text"] {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            width: 120px;
            font-size: 0.9rem;
        }
        input[type="file"] {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        textarea {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            height: fit-content;
        }
        button:hover { background: #2ea043; }
        button:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
        }
        #status {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #output {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            color: #c9d1d9;
        }
        #output .prompt-text { color: #8b949e; }
        #output .gen-text { color: #7ee787; }
        #stats {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin-top: 1rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #8b949e;
            white-space: pre-wrap;
            display: none;
        }
        .simd-check {
            margin-bottom: 1rem;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .simd-yes {
            background: #0d2818;
            border: 1px solid #238636;
            color: #7ee787;
        }
        .simd-no {
            background: #2d1117;
            border: 1px solid #da3633;
            color: #f85149;
        }
    </style>
</head>
<body>
    <h1>BitNet WASM Inference</h1>
    <p class="subtitle">
        BitNet b1.58 2B4T text generation in the browser via WebAssembly SIMD
    </p>

    <div id="simd-status" class="simd-check"></div>

    <div id="status">Initializing Web Worker...</div>

    <!-- Model Loading -->
    <div class="section">
        <div class="section-title">Model</div>
        <div class="controls">
            <div class="input-group">
                <label>GGUF File</label>
                <input type="file" id="file-input" accept=".gguf" disabled>
            </div>
            <div class="input-group">
                <label>Layers (-1 = all)</label>
                <input type="number" id="layers-input" value="-1" min="-1" max="30">
            </div>
            <button id="load-btn" disabled>Load Model</button>
        </div>
    </div>

    <!-- Generation Settings -->
    <div class="section">
        <div class="section-title">Settings</div>
        <div class="controls">
            <div class="input-group">
                <label>Max Tokens</label>
                <input type="number" id="max-tokens" value="64" min="1" max="512">
            </div>
            <div class="input-group">
                <label>Temperature</label>
                <input type="number" id="temperature" value="0.0" min="0" max="2" step="0.1">
            </div>
            <div class="input-group">
                <label>Top-p</label>
                <input type="number" id="top-p" value="0.9" min="0" max="1" step="0.05">
            </div>
            <div class="input-group">
                <label>Seed</label>
                <input type="number" id="seed" value="42" min="0">
            </div>
        </div>
    </div>

    <!-- Prompt -->
    <div class="section">
        <div class="section-title">Prompt</div>
        <textarea id="prompt" placeholder="Enter your prompt here...">Hello</textarea>
        <div style="margin-top: 0.5rem;">
            <button id="generate-btn" disabled>Generate</button>
        </div>
    </div>

    <!-- Output -->
    <div class="section">
        <div class="section-title">Output</div>
        <pre id="output">Load a model to start generating text.</pre>
    </div>

    <!-- Stats -->
    <pre id="stats"></pre>

    <script>
        /* ---- State ---- */
        let worker = null;
        let modelLoaded = false;
        let generating = false;

        /* ---- DOM refs ---- */
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const statsEl = document.getElementById('stats');
        const fileInput = document.getElementById('file-input');
        const layersInput = document.getElementById('layers-input');
        const loadBtn = document.getElementById('load-btn');
        const generateBtn = document.getElementById('generate-btn');
        const promptEl = document.getElementById('prompt');

        /* ---- SIMD check (same as benchmark) ---- */
        async function checkSimd() {
            const el = document.getElementById('simd-status');
            try {
                const bytes = new Uint8Array([
                    0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
                    0x01, 0x05, 0x01, 0x60, 0x00, 0x01, 0x7b,
                    0x03, 0x02, 0x01, 0x00,
                    0x0a, 0x16, 0x01, 0x14, 0x00,
                    0xfd, 0x0c,
                    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                    0x0b
                ]);
                await WebAssembly.compile(bytes);
                el.className = 'simd-check simd-yes';
                el.textContent = 'WASM SIMD supported';
                return true;
            } catch (e) {
                el.className = 'simd-check simd-no';
                el.textContent = 'WASM SIMD NOT supported - inference will fail';
                return false;
            }
        }

        /* ---- Status helpers ---- */
        function setStatus(text, showSpinner) {
            statusEl.innerHTML = (showSpinner
                ? '<div class="spinner" style="display:inline-block"></div> '
                : '') + text;
        }

        /* ---- Worker message handler ---- */
        function onWorkerMessage(e) {
            var msg = e.data;
            switch (msg.type) {
                case 'ready':
                    setStatus('WASM module loaded. Select a GGUF model file.', false);
                    fileInput.disabled = false;
                    loadBtn.disabled = false;
                    break;

                case 'progress':
                    setStatus(msg.message, true);
                    break;

                case 'loaded':
                    if (msg.success) {
                        modelLoaded = true;
                        setStatus('Model loaded. Ready to generate.', false);
                        generateBtn.disabled = false;
                        outputEl.textContent = 'Model loaded. Enter a prompt and click Generate.';
                    } else {
                        setStatus('Load failed: ' + msg.error, false);
                    }
                    loadBtn.disabled = false;
                    break;

                case 'token':
                    outputEl.querySelector('.gen-text').textContent += msg.piece;
                    outputEl.scrollTop = outputEl.scrollHeight;
                    break;

                case 'stats':
                    /* Collect stderr lines for stats display */
                    statsEl.style.display = 'block';
                    statsEl.textContent += msg.text + '\n';
                    break;

                case 'done':
                    generating = false;
                    generateBtn.disabled = false;
                    if (msg.n_tokens >= 0) {
                        setStatus('Generated ' + msg.n_tokens + ' tokens.', false);
                    } else {
                        setStatus('Generation failed.', false);
                    }
                    break;

                case 'error':
                    generating = false;
                    generateBtn.disabled = false;
                    setStatus('Error: ' + msg.message, false);
                    break;
            }
        }

        /* ---- Load model ---- */
        function loadModel() {
            var file = fileInput.files[0];
            if (!file) {
                setStatus('Please select a GGUF file first.', false);
                return;
            }

            loadBtn.disabled = true;
            generateBtn.disabled = true;
            modelLoaded = false;

            var sizeMB = (file.size / 1024 / 1024).toFixed(0);
            setStatus('Reading ' + file.name + ' (' + sizeMB + ' MB)...', true);

            var reader = new FileReader();
            reader.onload = function(e) {
                var buffer = e.target.result;
                var nLayers = parseInt(layersInput.value) || -1;
                /* Transfer the ArrayBuffer to worker (zero-copy) */
                worker.postMessage(
                    { type: 'load', buffer: buffer, n_layers: nLayers },
                    [buffer]
                );
            };
            reader.onerror = function() {
                setStatus('Failed to read file.', false);
                loadBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        }

        /* ---- Generate ---- */
        function startGenerate() {
            if (!modelLoaded || generating) return;

            var prompt = promptEl.value;
            if (!prompt) {
                setStatus('Please enter a prompt.', false);
                return;
            }

            generating = true;
            generateBtn.disabled = true;

            /* Clear output, show prompt in grey + generated text in green */
            outputEl.innerHTML = '<span class="prompt-text"></span><span class="gen-text"></span>';
            outputEl.querySelector('.prompt-text').textContent = prompt;

            /* Clear stats */
            statsEl.textContent = '';
            statsEl.style.display = 'none';

            var maxTokens = parseInt(document.getElementById('max-tokens').value) || 64;
            var temperature = parseFloat(document.getElementById('temperature').value) || 0.0;
            var topP = parseFloat(document.getElementById('top-p').value) || 0.9;
            var seed = parseInt(document.getElementById('seed').value) || 42;

            setStatus('Generating...', true);

            worker.postMessage({
                type: 'generate',
                prompt: prompt,
                max_tokens: maxTokens,
                temperature: temperature,
                top_p: topP,
                seed: seed
            });
        }

        /* ---- Init ---- */
        async function init() {
            var simdOk = await checkSimd();
            if (!simdOk) {
                setStatus('Your browser does not support WASM SIMD.', false);
                return;
            }

            setStatus('Loading WASM module...', true);

            worker = new Worker('worker.js');
            worker.onmessage = onWorkerMessage;
            worker.onerror = function(e) {
                setStatus('Worker error: ' + e.message, false);
            };

            loadBtn.onclick = loadModel;
            generateBtn.onclick = startGenerate;
        }

        init();
    </script>
</body>
</html>
